<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Login</title>
</head>

<body>
    <header id="page_header">
        <div>
            <div><img src="img/logo.jpeg" alt="Sweet Scoop Ice Cream Logo" /></div>
        </div>

        <div>
            <h3>Sweet Scoop Ice Cream</h3>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <main class="signup_main">
        <div id="signup_container">
            <h2>Signup</h2>
            <form id="signup_form" action="menu_view.html">
                <label for="username">Username</label><br />
                <input type="text" id="username" name="username" required /><br /><br />

                <label for="email">Email</label><br />
                <input type="text" id="email" name="email" required /><br /><br />

                <label for="password">Password</label><br />
                <input type="text" id="password" name="password" required /><br /><br />

                <label for="confirm_password">Confirm password</label><br />
                <input type="text" id="confirm_password" name="confirm_password" required /><br /><br />

                <button class="signup_btn" type="submit">Signup</button>
                <br><br>
            </form>
            <div id="message-component"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Sweet Scoop Ice Cream.</p>
    </footer>
</body>

</html>
