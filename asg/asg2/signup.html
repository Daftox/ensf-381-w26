<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Login</title>
</head>

<body>
    <header id="page_header">
        <div>
            <div><img src="img/logo.jpeg" alt="Sweet Scoop Ice Cream Logo" /></div>
        </div>

        <div>
            <h3>Sweet Scoop Ice Cream</h3>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <main class="signup_main">
        <div id="signup_container">
            <h2>Signup</h2>
            <form id="signup_form" action="menu_view.html">
                <label for="username">Username</label><br />
                <input type="text" id="username" name="username" required /><br /><br />

                <label for="email">Email</label><br />
                <input type="text" id="email" name="email" required /><br /><br />

                <label for="password">Password</label><br />
                <input type="text" id="password" name="password" required /><br /><br />

                <label for="confirm_password">Confirm password</label><br />
                <input type="text" id="confirm_password" name="confirm_password" required /><br /><br />

                <button class="signup_btn" type="submit">Signup</button>
                <br><br>
            </form>
            <div id="message-component"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Sweet Scoop Ice Cream.</p>
    </footer>
</body>

</html>

<script type="text/javascript">
const form = document.getElementById("signup_form");
const msgComp = document.getElementById("message-component");

function getErrors(username, email, password, confirmedPassword) {
    const errors = [];
    const userRegex = /^[a-zA-Z][a-zA-Z0-9-_]{2,19}$/;
    const emailRegex = /^[^\s@]+@[^\s@]+\.(com|net|io)$/;
    const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()\-_=+[\]{}|;:'",.<>/?`~])[A-Za-z\d!@#$%^&*()\-_=+[\]{}|;:'",.<>/?`~]{8,}$/;

    if (!userRegex.test(username)) errors.push("Username: 3-20 chars (A-Z, 0-9, -, _), starts with a letter, no spaces");
    if (!emailRegex.test(email)) errors.push("Email: must contain @ and end in .com, .net, or .io).");
    if (!passRegex.test(password)) errors.push("Password: 8+ chars (minimum uppercase, lowercase, number, specials).");
    if (password !== confirmedPassword) errors.push("Passwords do not match.");

    return errors;
}

form.addEventListener("submit", (e) => {
    e.preventDefault();
    msgComp.innerHTML = "";

    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmedPassword = document.getElementById("confirm_password").value;

    const errors = getErrors(username, email, password, confirmedPassword);
    const box = document.createElement("div");

    if (errors.length > 0) {
        box.className = "styled-box error";
        box.innerHTML = errors.join("<br>");
    } else {
        box.className = "styled-box success";
        box.textContent = "Signup successful! Redirecting to login...";
        setTimeout(() => { window.location.href = "login.html"; }, 2000);
    }
    
    msgComp.appendChild(box);
});
</script>
</script>
