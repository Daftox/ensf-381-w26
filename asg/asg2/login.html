<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Login</title>
</head>

<body>
    <header id="page_header">
        <div>
            <div><img src="img/logo.jpeg" alt="Sweet Scoop Ice Cream Logo" /></div>
        </div>

        <div>
            <h3>Sweet Scoop Ice Cream</h3>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <main class="login_main">
        <div id="login_container">
            <h2>Welcome Back!</h2>
            <p>Please enter your username to log in.</p>
            <form id="login_form" action="menu_view.html">
                <label for="username">Username:</label><br />
                <input type="text" id="username" name="username" required /><br /><br />

                <label for="password">Password:</label><br />
                <input type="password" id="password" name="password" required /><br /><br />

                <div>
                    <input type="checkbox" id="forgot_password" name="forgot_password" disabled />
                    <label for="forgot_password">Forgot Password?</label><br /><br />
                </div>
                <button type="submit">Login</button>
            </form>
            <div>New User? <a href="signup.html"><button class="to_signup_btn">Create an account</button></a></div>
            <div id="message-component"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Sweet Scoop Ice Cream.</p>
    </footer>
</body>

</html>

<script type="text/javascript">
    const users = new Array();

    async function retrieveData() {
        try {
            const response = await fetch(
                "https://jsonplaceholder.typicode.com/users",
            );
            const data = await response.json();
            data.forEach((element) => {
                users.push(element);
            });
            console.log("Users array", users);
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    retrieveData();

    function checkCredentials(username, password) {
        for (let i = 0; i < users.length; i++) {
            if (users[i].username === username && users[i].email === password) {
                return true;
            }
        }
        return false;
    }

    let loginStatus = "idle";

    function renderMessageBox() {
        const container = document.getElementById("message-component");

        if (loginStatus === "idle") {
            container.innerHTML = "";
            return;
        }

        const isSuccess = loginStatus === "success";
        container.innerHTML = `
        <div class="styled-box ${isSuccess ? 'success' : 'error'}">
            ${isSuccess ? '✅ Login successful! Redirecting...' : '❌ Invalid credentials.'}
        </div>
    `;
    }

    document.getElementById("login_form").addEventListener("submit", function (e) {
        e.preventDefault();

        const usernameProvided = document.getElementById("username").value;
        const passwordProvided = document.getElementById("password").value;

        if (checkCredentials(usernameProvided, passwordProvided)) {
            loginStatus = "success";
            setTimeout(() => window.location.href = "menu_view.html", 2000);
        } else {
            loginStatus = "error";
        }

        renderMessageBox();
    });
</script>
